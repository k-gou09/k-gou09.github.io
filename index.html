<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121212">
    <title>KGP - Entrer</title>
    <style>
        body {
            background-color: #0d0211;
            background-image: url('body.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @keyframes subtle-glow {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(191, 0, 255, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(191, 0, 255, 0.8));
            }
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .animated-logo {
            width: clamp(300px, 50vw, 400px);
            height: auto;
            animation: subtle-glow 4s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .animated-logo:hover {
            transform: scale(1.05);
        }

        .dark-theme-button {
            background-color: transparent;
            border: 2px solid #bf00ff;
            color: #ffffff;
            padding: 14px 30px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease-in-out;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            margin-bottom: 20px;
        }

        .dark-theme-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(191, 0, 255, 0.4), transparent);
            transition: left 0.4s ease-in-out;
        }

        .dark-theme-button:hover {
            background-color: #bf00ff;
            box-shadow: 0 0 20px rgba(191, 0, 255, 0.5);
        }

        .dark-theme-button:hover::before {
            left: 100%;
        }

        @media (max-width: 480px) {
            .logo-container {
                margin-bottom: 30px;
            }

            .dark-theme-button {
                padding: 12px 24px;
            }
        }

        /* Bouton avec Lueur Mauve Intense */
        .btn-mauve-glow {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            color: #bf00ff;
            border: 2px solid #383737;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 15px rgba(191, 0, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-decoration: none;
            display: inline-block;
        }

        .btn-mauve-glow:hover {
            color: #d400ff;
            box-shadow: 
                0 0 25px rgba(191, 0, 255, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            text-shadow: 0 0 10px rgba(191, 0, 255, 0.8);
        }

        .btn-mauve-glow:active {
            box-shadow: 
                0 0 10px rgba(191, 0, 255, 0.5),
                inset 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* Style pour l'animation finale */
        .final-animation {
            text-align: center;
            margin: 30px auto;
        }
        .final-animation span {
            font-size: 24px;
            font-weight: bold;
            color: #bf00ff;
            animation: loading-text 1.8s infinite;
            display: inline-block;
        }
        .final-animation span:nth-child(1) { animation-delay: 0.1s; }
        .final-animation span:nth-child(2) { animation-delay: 0.2s; }
        .final-animation span:nth-child(3) { animation-delay: 0.3s; }
        .final-animation span:nth-child(4) { animation-delay: 0.4s; }
        .final-animation span:nth-child(5) { animation-delay: 0.5s; }
        .final-animation span:nth-child(6) { animation-delay: 0.6s; }
        .final-animation span:nth-child(7) { animation-delay: 0.7s; }
        .final-animation span:nth-child(8) { animation-delay: 0.8s; }
        .final-animation span:nth-child(9) { animation-delay: 0.9s; }
        .final-animation span:nth-child(10) { animation-delay: 1s; }
        .final-animation span:nth-child(11) { animation-delay: 1.1s; }
        .final-animation span:nth-child(12) { animation-delay: 1.2s; }

        @keyframes loading-text {
            0%, 100% {
                opacity: 0.2;
                text-shadow: none;
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 15px rgba(191, 0, 255, 0.8);
            }
        }
    </style>
</head>
<body>
    <main class="content-wrapper">
        <div class="logo-container">
            <img alt="Logo KGP" loading="lazy" class="animated-logo" src="log_kgp0.png">
        </div>
        <div class="final-animation">
            <span>C</span><span>h</span><span>a</span><span>r</span><span>g</span><span>e</span><span>m</span><span>e</span><span>n</span><span>t</span><span>.</span><span>.</span>
        </div>
    </main>

    <script>
        // Redirection après 5 secondes
        setTimeout(function() {
            window.location.href = 'html/news.html';
        }, 5000); // 5000 millisecondes = 5 secondes
    </script>
</body>
</html>
