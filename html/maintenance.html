<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | K-gou Prod</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #0A0A12;
            --color-text: #E0E0E0;
            --gradient-main: linear-gradient(90deg, #7C3AED, #DB2777);
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .tech-font {
            font-family: 'Playfair Display', serif;
        }
        
        .gradient-text {
            background-image: var(--gradient-main);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-[var(--color-bg)]">
    
    <!-- Section de Navigation -->
    <nav class="w-full z-50 bg-black bg-opacity-60 backdrop-filter backdrop-blur-lg border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-center h-20 items-center">
                <!-- Logo/Nom du site -->
                <div class="flex-shrink-0 flex items-center">
                    <a href="../index.html" class="text-2xl font-bold gradient-text tech-font">K-gou Prod</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenu Principal -->
    <main class="flex-grow flex items-center justify-center text-center px-4">
        <div class="bg-black/30 backdrop-blur-sm p-8 md:p-12 rounded-2xl border border-gray-800 shadow-2xl shadow-purple-500/10">
            <i class="fas fa-tools text-6xl md:text-7xl gradient-text mb-6 animate-pulse"></i>
            <h1 class="text-4xl md:text-6xl font-bold tech-font text-white mb-4">
                Site en Maintenance
            </h1>
            <p class="text-lg md:text-xl text-gray-300 max-w-2xl mx-auto">
                Nous effectuons actuellement des mises à jour pour améliorer votre expérience.<br>
                Le site sera de retour très prochainement. Merci de votre patience !
            </p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full p-4">
        <p class="text-center text-xs text-white bg-black/80 rounded-lg px-2 py-1 max-w-fit mx-auto flex items-center gap-1 tech-font">
            K-gou_Prod 
            <img src="../img/v.svg" alt="K-gou Prod Logo" class="w-4 h-4 inline-block filter brightness-0 invert">
            <a href="https://www.facebook.com/nc.prod.794" class="text-white underline hover:text-blue-300" target="_blank">Studio</a>
        </p>
    </footer>

</body>
</html>
